<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Walkie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="lobby-screen" class="screen">
            <h1>Group Walkie</h1>
            <p class="subtitle">Connect with your group of friends instantly.</p>
            
            <div class="card">
                <div class="input-group">
                    <input type="text" id="join-code-input" placeholder="ENTER 4-DIGIT CODE" maxlength="4">
                    <button id="join-btn" class="btn primary-btn">Join Friends</button>
                </div>
                <div id="error-message" class="error-text"></div>
                
                <div class="divider"><span>OR</span></div>
                
                <button id="create-btn" class="btn secondary-btn">Create a Group Code</button>
                <div id="room-code-display" class="code-display"></div>
            </div>
        </div>

        <div id="radio-screen" class="screen" style="display: none;">
            <div class="status-panel">
                <span class="status-dot connected" id="status-dot"></span>
                <span id="status-text" class="status-text">Connected to Group</span>
            </div>
            <div id="room-id-banner" class="room-banner">GROUP CODE: ----</div>

            <div class="friends-list-container">
                <h3>Friends in Room:</h3>
                <div id="player-list" class="player-list friendly-list">
                    </div>
            </div>

            <div class="ptt-container">
                <button id="ptt-btn" class="ptt-btn">
                    <div class="ptt-inner">
                        <span id="ptt-text">HOLD TO SPEAK</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="audio-container" style="display: none;"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
